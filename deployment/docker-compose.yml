services:
  flask_app:
    build: ./flask_app
    container_name: flask_app
    networks:
      - ecg_net
    volumes:
      - ./flask_app/models:/app/models:ro

  spring_app:
    build: ./spring_app
    container_name: spring_app
    depends_on:
      - flask_app
    networks:
      - ecg_net
    ports:
      - "8080:8080"

networks:
  ecg_net:
    driver: bridge
